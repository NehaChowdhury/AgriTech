<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriTech - Smart Agriculture Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-primary { @apply bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-8 rounded-xl transition-all shadow-lg active:scale-95; }
        .btn-secondary { @apply bg-white hover:bg-slate-50 text-slate-700 font-semibold py-3 px-8 rounded-xl transition-all border border-slate-200 active:scale-95; }
        .input-field { @apply w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:ring-2 focus:ring-emerald-500 outline-none transition-all; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 
                            500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="/" class="flex items-center space-x-2">
                    <div class="p-2 bg-emerald-600 rounded-xl">
                        <i data-lucide="sprout" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-2xl font-extrabold text-slate-900 tracking-tight">Agri<span class="text-emerald-600">Tech</span></span>
                </a>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/" class="text-sm font-semibold text-slate-600 hover:text-emerald-600">Home</a>
                    <a href="/crop" class="text-sm font-semibold text-slate-600 hover:text-emerald-600">Crop</a>
                    <a href="/fertilizer" class="text-sm font-semibold text-slate-600 hover:text-emerald-600">Fertilizer</a>
                    <a href="/crop" class="btn-primary py-2 px-6 text-sm">Get Started</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden">
                    <button id="menu-btn" class="p-2 text-slate-600">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-200 p-4 space-y-4">
            <a href="/" class="block text-lg font-medium text-slate-600">Home</a>
            <a href="/crop" class="block text-lg font-medium text-slate-600">Crop Recommendation</a>
            <a href="/fertilizer" class="block text-lg font-medium text-slate-600">Fertilizer Advice</a>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-2xl font-black text-slate-900">Agri<span class="text-emerald-600">Tech</span></span>
            <p class="text-slate-500 mt-2 text-sm">© 2026 AgriTech Decision Support System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
